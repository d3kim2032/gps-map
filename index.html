<!DOCTYPE html>
<html>
<head>
  <title>Imaginary Country Map - Subway Stations Access</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.pm/dist/leaflet.pm.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.pm/dist/leaflet.pm.min.js"></script>
  <style>
    body { font-family: Arial; }
    #map { height: 700px; width: 700px; margin: 20px auto; border: 2px solid #333; }
    #instructions { margin-top: 10px; padding: 10px; background: #f0f0f0; font-weight: bold; width:700px; margin:auto; }
    input, button { margin: 5px; }
  </style>
</head>
<body>

<h2 style="text-align:center;">Imaginary Country Map - Subway Stations Required</h2>
<input type="text" id="search" placeholder="Add place name">
<button onclick="searchPlace()">🔍 Add Place</button>
<button onclick="startNavigation()">▶️ Start Navigation</button>

<div id="map"></div>
<div id="instructions">
Click map to add cities, landmarks, roads, subway lines.  
Subways can only be accessed through stations.  
Stations, roads, landmarks, and lines are editable and deletable.
</div>

<script>
const map = L.map('map', { crs: L.CRS.Simple, minZoom: -1, maxZoom: 2 }).setView([350,350],0);
const bounds = [[0,0],[700,700]];
L.rectangle(bounds,{color:'#fefefe',weight:1}).addTo(map);
map.fitBounds(bounds);

let places=[], roads=[], subwayLines=[], subwayStations=[];
let startPoint=null, endPoint=null;
let routeCoords=[], gpsMarker, step=0;

map.pm.addControls({position:'topright', drawMarker:false, drawPolygon:false, drawCircle:false, drawCircleMarker:false, drawRectangle:false, editMode:true, removalMode:true});

// Click map to add objects
map.on('click', function(e){
    const x=e.latlng.lat, y=e.latlng.lng;
    const name=prompt("Enter place name:");
    if(!name) return;
    const type=prompt("Type: city, landmark, road, subway?");
    if(!type) return;

    switch(type.toLowerCase()){
        case "city":
        case "landmark":
            const color = type==="landmark" ? "purple" : "green";
            const marker = L.circleMarker([x,y],{radius:8,color:color,fillOpacity:1,weight:2}).addTo(map).bindPopup(name+" ("+type+")");
            marker.on('click', ()=> selectStartEnd(marker,{x,y,name,type}));
            places.push({name,x,y,type,marker});
            break;

        case "road":
            const roadLine=L.polyline([[x,y],[x+50,y]],{color:'gray',weight:3}).addTo(map).bindPopup(name);
            roadLine.pm.enable({allowSelfIntersection:true});
            roads.push({name,layer:roadLine});
            break;

        case "subway":
            const subwayLine=L.polyline([[x,y],[x+50,y+50]],{color:'orange',weight:5}).addTo(map).bindPopup(name);
            subwayLine.pm.enable({allowSelfIntersection:true});
            subwayLines.push({name,layer:subwayLine});
            addStations(subwayLine);
            break;

        default: alert("Invalid type!");
    }
});

// Add stations along subway lines
function addStations(line){
    let addMore=true;
    while(addMore){
        const t=prompt("Add a station? Type 0-1 along line, or 'no' to stop");
        if(t==='no') break;
        const pos=parseFloat(t);
        if(isNaN(pos)||pos<0||pos>1) continue;
        const coords=line.getLatLngs();
        const sx=coords[0].lat*(1-pos)+coords[coords.length-1].lat*pos;
        const sy=coords[0].lng*(1-pos)+coords[coords.length-1].lng*pos;
        const sName=prompt("Station name:");
        if(!sName) continue;
        const sMarker=L.circleMarker([sx,sy],{radius:6,color:'red',fillOpacity:1,weight:2}).addTo(map).bindPopup(sName);
        sMarker.pm.enable({draggable:true,snappable:true});
        sMarker.setZIndexOffset(1000); // always visible
        subwayStations.push({name:sName,x:sx,y:sy,marker:sMarker,line:line});
    }
}

// Add place by search
function searchPlace(){
    const name=document.getElementById("search").value;
    if(!name) return alert("Enter place name");
    const x=Math.random()*700, y=Math.random()*700;
    const marker=L.circleMarker([x,y],{radius:8,color:'green',fillOpacity:1,weight:2}).addTo(map).bindPopup(name+" (city)");
    marker.on('click', ()=> selectStartEnd(marker,{x,y,name,type:'city'}));
    places.push({name,x,y,type:'city',marker});
}

// Select start/end
function selectStartEnd(marker,point){
    if(!startPoint){ startPoint=point; marker.bindPopup(point.name+" (START)").openPopup(); document.getElementById("instructions").innerText="START set. Now click END place."; }
    else if(!endPoint && point!==startPoint){ endPoint=point; marker.bindPopup(point.name+" (END)").openPopup(); document.getElementById("instructions").innerText="END set. Click ▶️ Start Navigation."; }
}

// Navigation with subway stations enforced
function startNavigation(){
    if(!startPoint||!endPoint) return alert("Select START and END points");
    routeCoords=[];
    // Simple route: start -> nearest subway station if start is not a station -> subway line -> nearest subway station to end -> end
    let startStation = nearestStation(startPoint);
    let endStation = nearestStation(endPoint);

    if(startStation) routeCoords.push([startPoint.x,startPoint.y],[startStation.x,startStation.y]);
    else routeCoords.push([startPoint.x,startPoint.y]);

    if(startStation && endStation && startStation.line === endStation.line){
        routeCoords.push([endStation.x,endStation.y]);
    } else if(startStation && startStation.line){
        const coords = startStation.line.getLatLngs().map(c=>[c.lat,c.lng]);
        routeCoords = routeCoords.concat(coords);
        if(endStation) routeCoords.push([endStation.x,endStation.y]);
    }

    if(endStation && (!routeCoords.includes([endPoint.x,endPoint.y]))) routeCoords.push([endPoint.x,endPoint.y]);
    if(routeCoords.length===0) routeCoords.push([startPoint.x,startPoint.y],[endPoint.x,endPoint.y]);

    L.polyline(routeCoords,{color:'blue',weight:3,dashArray:'5,5'}).addTo(map);
    step=0;
    if(gpsMarker) map.removeLayer(gpsMarker);
    gpsMarker=L.circleMarker(routeCoords[0],{radius:8,color:'red',fillOpacity:1}).addTo(map);
    move();
}

function nearestStation(point){
    if(subwayStations.length===0) return null;
    return subwayStations.reduce((nearest,s)=>{
        const d=Math.sqrt(Math.pow(point.x-s.x,2)+Math.pow(point.y-s.y,2));
        return (!nearest || d<nearest.dist)?{station:s,dist:d}:nearest;
    },null)?.station;
}

function move(){
    if(step>=routeCoords.length){ document.getElementById("instructions").innerText="🎉 Arrived at "+endPoint.name+"!"; return; }
    let speed = 200;
    if(!onLine(routeCoords[step])) speed=400;
    gpsMarker.setLatLng(routeCoords[step]);
    map.setView(routeCoords[step]);
    document.getElementById("instructions").innerText="🚗/🚶 Moving towards "+endPoint.name+"...";
    step++;
    setTimeout(move,speed);
}

function onLine(point){
    const allLines=roads.concat(subwayLines);
    for(let line of allLines){
        const coords=line.layer.getLatLngs().map(c=>[c.lat,c.lng]);
        for(let c of coords) if(distance(point,c)<10) return true;
    }
    return false;
}

function distance(a,b){return Math.sqrt(Math.pow(a[0]-b[0],2)+Math.pow(a[1]-b[1],2));}

</script>
</body>
</html>
