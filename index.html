<!DOCTYPE html>
<html>
<head>
  <title>Imaginary Country - Subway Stations & Landmarks</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.pm/dist/leaflet.pm.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.pm/dist/leaflet.pm.min.js"></script>
  <style>
    body { font-family: Arial; }
    #map { height: 700px; width: 700px; margin: 20px auto; border: 2px solid #333; }
    #instructions { margin-top: 10px; padding: 10px; background: #f0f0f0; font-weight: bold; width:700px; margin:auto; }
    input, button { margin: 5px; }
  </style>
</head>
<body>

<h2 style="text-align:center;">🗺️ Imaginary Country - Subway Stations & Landmarks</h2>

<input type="text" id="search" placeholder="Add city by name">
<button onclick="searchPlace()">🔍 Add City</button>
<button onclick="startNavigation()">▶️ Start Navigation</button>

<div id="map"></div>
<div id="instructions">Click to add cities, roads, subway lines. For subway lines, you can also add stations. Landmarks can be added with a type selection.</div>

<script>
const map = L.map('map', { crs: L.CRS.Simple, minZoom: -1, maxZoom: 2 }).setView([350, 350], 0);
const bounds = [[0,0],[700,700]];
L.rectangle(bounds,{color:'#fefefe',weight:1}).addTo(map);
map.fitBounds(bounds);

let cities = [], roads = [], subwayLines = [], subwayStations = [], landmarks = [];
let startPoint = null, endPoint = null;
let routeCoords = [], gpsMarker, step = 0;

// Enable editing
map.pm.addControls({ position: 'topright', drawMarker: false, drawPolygon: false, drawCircle: false, drawCircleMarker: false, drawRectangle: false });

map.on('click', function(e){
  const x = e.latlng.lat;
  const y = e.latlng.lng;
  const name = prompt("Enter place name:");
  if(!name) return;

  const type = prompt("Type: city, road, subway, landmark?");
  if(!type) return;

  switch(type.toLowerCase()){
    case "city":
      const marker = L.marker([x,y]).addTo(map).bindPopup(name);
      marker.on('click', ()=> selectStartEnd(marker,{x,y,name}));
      cities.push({name,x,y,marker});
      break;

    case "road":
      const roadLine = L.polyline([[x,y],[x+50,y]],{color:'gray',weight:3}).addTo(map).bindPopup(name);
      roadLine.pm.enable({allowSelfIntersection:true});
      roads.push({name,layer:roadLine});
      break;

    case "subway":
      const subwayLine = L.polyline([[x,y],[x+50,y+50]],{color:'orange',weight:5}).addTo(map).bindPopup(name);
      subwayLine.pm.enable({allowSelfIntersection:true});
      subwayLines.push({name,layer:subwayLine});

      // Ask user to add stations along this line
      const addStations = confirm("Add stations for this subway line?");
      if(addStations){
        let numStations = parseInt(prompt("How many stations to add?"));
        if(!isNaN(numStations) && numStations>0){
          const coords = subwayLine.getLatLngs();
          for(let i=0;i<numStations;i++){
            let t = i/(numStations-1);
            const sx = coords[0].lat*(1-t) + coords[coords.length-1].lat*t;
            const sy = coords[0].lng*(1-t) + coords[coords.length-1].lng*t;
            const stationName = prompt(`Name for station ${i+1}:`);
            if(stationName){
              const sMarker = L.circleMarker([sx,sy],{radius:6,color:'red'}).addTo(map).bindPopup(stationName);
              subwayStations.push({name:stationName,x:sx,y:sy,marker:sMarker});
            }
          }
        }
      }
      break;

    case "landmark":
      const landmarkType = prompt("Type of landmark (mountain, river, castle, etc)?");
      let color='purple';
      if(landmarkType==='mountain') color='brown';
      else if(landmarkType==='river') color='blue';
      else if(landmarkType==='castle') color='gold';
      L.circleMarker([x,y],{radius:8,color:color}).addTo(map).bindPopup(name+" ("+landmarkType+")");
      landmarks.push({name,type:landmarkType,x,y});
      break;

    default:
      alert("Invalid type!");
  }
});

function searchPlace(){
  const name = document.getElementById("search").value;
  if(!name) return alert("Enter city name");
  const x = Math.random()*700;
  const y = Math.random()*700;
  const marker = L.marker([x,y]).addTo(map).bindPopup(name);
  marker.on('click', ()=> selectStartEnd(marker,{x,y,name}));
  cities.push({name,x,y,marker});
}

function selectStartEnd(marker,point){
  if(!startPoint){
    startPoint = point;
    marker.bindPopup(point.name+" (START)").openPopup();
    document.getElementById("instructions").innerText="START set. Now click END city.";
  } else if(!endPoint && point!==startPoint){
    endPoint = point;
    marker.bindPopup(point.name+" (END)").openPopup();
    document.getElementById("instructions").innerText="END set. Click ▶️ Start Navigation.";
  }
}

function startNavigation(){
  if(!startPoint || !endPoint) return alert("Select START and END points");

  let allLines = roads.concat(subwayLines);
  routeCoords = [];

  if(allLines.length>0){
    let closestLine = allLines.reduce((best,line)=>{
      const coords = line.layer.getLatLngs();
      const dist = coords.reduce((min,c)=>Math.min(min,distance([c.lat,c.lng],[startPoint.x,startPoint.y])),Infinity);
      return dist<best.dist?{line,line,dist}:best;
    },{line:null,dist:Infinity}).line;

    if(closestLine){
      const coords = closestLine.layer.getLatLngs().map(c=>[c.lat,c.lng]);
      routeCoords.push([startPoint.x,startPoint.y], ...coords, [endPoint.x,endPoint.y]);
    } else {
      routeCoords.push([startPoint.x,startPoint.y],[endPoint.x,endPoint.y]);
    }
  } else {
    routeCoords.push([startPoint.x,startPoint.y],[endPoint.x,endPoint.y]);
  }

  L.polyline(routeCoords,{color:'blue',weight:3,dashArray:'5,5'}).addTo(map);

  step=0;
  if(gpsMarker) map.removeLayer(gpsMarker);
  gpsMarker = L.circleMarker(routeCoords[0],{radius:8,color:'red'}).addTo(map);
  move();
}

function move(){
  if(step>=routeCoords.length){
    document.getElementById("instructions").innerText="🎉 Arrived at "+endPoint.name+"!";
    return;
  }
  let speed = 200;
  if(!onLine(routeCoords[step])) speed=400;
  gpsMarker.setLatLng(routeCoords[step]);
  map.setView(routeCoords[step]);
  document.getElementById("instructions").innerText="🚗/🚶 Moving towards "+endPoint.name+"...";
  step++;
  setTimeout(move,speed);
}

function onLine(point){
  const allLines = roads.concat(subwayLines);
  for(let line of allLines){
    const coords = line.layer.getLatLngs().map(c=>[c.lat,c.lng]);
    for(let c of coords){
      if(distance(point,c)<10) return true;
    }
  }
  return false;
}

function distance(a,b){return Math.sqrt(Math.pow(a[0]-b[0],2)+Math.pow(a[1]-b[1],2));}
</script>

</body>
</html>
